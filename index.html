<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greeting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="card" role="region" aria-labelledby="card-title">
        <h1 id="card-title" class="card__title">Say hello</h1>
        <p class="card__hint">Enter your name below and we’ll greet you.</p>
        <label class="field">
          <span class="field__label">Your name</span>
          <input
            type="text"
            id="nameInput"
            class="field__input"
            placeholder="e.g. Alex"
            autocomplete="name"
          />
        </label>
        <button type="button" id="greetBtn" class="btn">Greet Me</button>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
